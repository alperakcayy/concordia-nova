<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Concordia Nova — Explore</title>

  <!-- Google font + icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --glass: rgba(0,0,0,.8);
      --card: #101010;
      --muted: #cfcfcf;
      --accent: #1da1f2;
      --danger: #e0245e;
      --yellow: #ffc107;
      --bottom-bar-height: 64px;
      --safe-area-top: 0px;
      --safe-area-bottom: 0px;
      --transition: .18s ease;
    }

    @supports (padding: env(safe-area-inset-top)) {
      :root {
        --safe-area-top: env(safe-area-inset-top);
        --safe-area-bottom: env(safe-area-inset-bottom);
      }
    }

    :root {
      --bottom-bar-height: calc(64px + var(--safe-area-bottom));
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      background: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1950&q=80') center/cover fixed no-repeat;
      padding-bottom: var(--bottom-bar-height);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      padding: calc(8px + var(--safe-area-top)) 10px 8px 10px;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,.12);
      flex-wrap: wrap;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 6px 8px;
      border-radius: 6px;
      position: relative;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      flex: 0 1 auto;
      min-width: 0;
      transition: var(--transition);
    }
    nav a:hover { background: rgba(255,255,255,.05); }
    .search-wrapper {
      position: relative;
      flex: 0 0 auto;
      width: 260px;
      max-width: 40vw;
      min-width: 140px;
      margin-left: 6px;
      margin-right: 6px;
    }
    .search-input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.45);
      color: #fff;
      outline: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      transition: var(--transition);
    }
    .search-input:focus {
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      border-color: var(--accent);
    }
    .notif-badge {
      position: absolute;
      top: 0px;
      right: 0px;
      min-width: 16px;
      height: 16px;
      line-height: 16px;
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      border-radius: 999px;
      text-align: center;
      padding: 0 4px;
      transform: translate(50%, -30%);
      font-weight: 700;
      z-index: 10;
    }
    .container {
      width: min(760px, 96vw);
      margin: 14px auto;
      background: var(--glass);
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.32);
    }
    h2 { margin: 0 0 10px; font-size: 18px; }
    .muted { color: var(--muted); font-size: 13px; }
    input[type="text"], input[type="password"], input[type="date"], textarea, input[type="file"] {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      background: #111;
      color: #fff;
      font-size: 14px;
    }
    textarea { min-height: 80px; resize: vertical; }
    button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      font-size: 14px;
    }
    button:hover:not(:disabled) { background: color-mix(in srgb, var(--accent) 90%, black); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .divider { height: 1px; background: rgba(255,255,255,.06); margin: 12px 0; }
    .feed { display: flex; flex-direction: column; gap: 12px; }
    .hashtag-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px;
      padding: 16px;
      transition: var(--transition);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hashtag-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.2); transform: translateY(-2px); }
    .hashtag-icon { font-size: 24px; color: var(--accent); flex-shrink: 0; }
    .hashtag-meta { flex: 1; min-width: 0; }
    .hashtag-name { font-weight: 600; font-size: 16px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hashtag-count { font-size: 13px; color: var(--muted); }
    .center-muted { text-align: center; color: #bbb; margin: 8px 0; font-size: 13px; }
    #settingsMenu {
      display: none;
      position: fixed;
      background: rgba(0,0,0,.95);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      z-index: 2001;
      min-width: 150px;
      width: 150px;
      padding: 6px 8px;
      box-shadow: 0 12px 36px rgba(0,0,0,.6);
    }
    #settingsMenu a {
      display: block;
      padding: 8px 10px;
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      border-radius: 6px;
      transition: var(--transition);
    }
    #settingsMenu a:hover { background: rgba(255,255,255,.03); }
    #languageList { display: none; }
    #languageList a { padding-left: 20px; }
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: var(--bottom-bar-height);
      padding: calc(6px + var(--safe-area-bottom)) 0 6px 0;
      background: rgba(0,0,0,.9);
      backdrop-filter: blur(6px);
      border-top: 1px solid rgba(255,255,255,.06);
      z-index: 1000;
    }
    .bottom-bar a {
      color: #fff;
      font-size: 14px;
      text-align: center;
      flex: 1;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px;
      min-width: 0;
      position: relative;
      transition: var(--transition);
    }
    .bottom-bar a:hover { background: rgba(255,255,255,.05); }
    .bottom-bar a i { font-size: 16px; line-height: 1; }
    .bottom-bar a span { font-size: 12px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bottom-bar .notif-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      transform: none;
      min-width: 14px;
      height: 14px;
      font-size: 9px;
      line-height: 14px;
      background: var(--danger);
      color: #fff;
      border-radius: 50%;
      z-index: 10;
      font-weight: 700;
    }
    .refresh-indicator {
      position: absolute;
      top: -50px;
      left: 0;
      width: 100%;
      height: 50px;
      background: rgba(0,0,0,0.8);
      color: #fff;
      text-align: center;
      line-height: 50px;
      font-size: 14px;
      transition: transform 0.2s;
      z-index: 999;
    }
    #feedPage {
      position: relative;
      transition: transform 0.2s;
    }
    .quote-preview {
      margin-top: 10px;
      display: none;
    }
    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 10000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
    }
    .modal-content {
      background-color: var(--card);
      margin: 5% auto;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
      border: 1px solid rgba(255,255,255,.06);
    }
    .close-modal {
      position: absolute;
      right: 15px;
      top: 10px;
      color: #aaa;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      background: none;
      border: none;
      z-index: 1;
      transition: var(--transition);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-modal:hover {
      color: var(--danger);
    }
    .modal-tweet {
      margin-bottom: 20px;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .modal-comments {
      margin-top: 20px;
    }
    .modal-comment-form {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }
    .modal-comment-form input {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #111;
      color: #fff;
    }
    .modal-comment-form button {
      width: auto;
      padding: 8px 12px;
    }
    .follow-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .follow-btn:hover { background: color-mix(in srgb, var(--accent) 90%, black); }
    .delete-comment-btn {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 14px;
      transition: var(--transition);
    }
    .delete-comment-btn:hover { color: #ff6b9d; }
    .media-preview {
      margin-top: 8px;
      max-width: 100%;
    }
    .media-preview img, .media-preview video {
      max-width: 100%;
      border-radius: 8px;
    }
    @media (max-width: 600px) {
      .modal-content {
        width: 95%;
        margin: 10% auto;
        padding: 15px;
      }
      .modal-actions { justify-content: flex-start; }
      .modal-comment-form { flex-direction: column; }
      .modal-comment-form button { width: 100%; }
      .hashtag-card { padding: 14px; }
      .hashtag-name { font-size: 15px; }
    }
    @media (max-width: 900px) {
      .search-wrapper { width: 200px; }
      nav { justify-content: space-between; padding: calc(8px + var(--safe-area-top)) 8px 8px 8px; gap: 4px; }
      nav a { font-size: 12px; padding: 4px 6px; }
    }
    @media (max-width: 600px) {
      :root { --bottom-bar-height: calc(56px + var(--safe-area-bottom)); }
      nav { gap: 6px; padding: calc(6px + var(--safe-area-top)) 6px 6px 6px; justify-content: space-between; align-items: center; flex-wrap: nowrap; }
      nav a { font-size: 12px; padding: 4px 6px; flex: 0 0 auto; }
      .search-wrapper { width: 140px; max-width: 35vw; min-width: 100px; order: 3; margin: 0; }
      .container { margin: 10px auto; padding: 12px; width: min(760px, 95vw); }
      .bottom-bar a span { font-size: 11px; }
      .bottom-bar a i { font-size: 14px; }
      body { padding-bottom: var(--bottom-bar-height); text-size-adjust: 100%; }
      #settingsMenu { min-width: 130px; width: 130px; padding: 6px; font-size: 13px; }
      .bottom-bar { padding: calc(4px + var(--safe-area-bottom)) 0 4px 0; }
      .actions { gap: 8px; }
      .action { font-size: 12px; padding: 4px 6px; }
      .comment-item { flex-direction: column; align-items: flex-start; gap: 4px; }
      .comment-item button { align-self: flex-end; margin-left: auto; }
      .quoted-tweet p, .tweet p { line-height: 1.4; }
      img { max-width: 100%; height: auto; }
    }
    @media (max-width: 480px) {
      nav a { min-width: auto; gap: 4px; }
      .container { padding: 10px; margin: 8px auto; }
    }
  </style>
</head>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // Supabase connection information
    const SUPABASE_URL = 'https://shkttorkfcnvkrwnkixf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNoa3R0b3JrZmNudmtyd25raXhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY2NzY2ODAsImV4cCI6MjA3MjI1MjY4MH0.GgDA8tSgQoMhCt_BYZU3mCkKaErUs_SQVNeWdCGQOgI';

    const USE_PLACEHOLDER_KEY = !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes('PASTE_YOUR_ANON_KEY_HERE');
    if (USE_PLACEHOLDER_KEY) {
      console.warn('Supabase anon key is missing or in placeholder state. Please fill in the SUPABASE_ANON_KEY variable.');
    }

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window.supabase = supabase; // for debug

    /* ====== GLOBALS ====== */
    let currentUser = null;
    let currentUserData = null;
    let currentLang = localStorage.getItem('appLang') || 'en';
    let realtimeNotifChannel = null;

    const translations = {
      tr: {
        login: 'Giriş',
        register: 'Kayıt Ol',
        home: 'Anasayfa',
        profile: 'Profil',
        search: 'Kullanıcı ara...',
        exploreTitle: 'Keşfet',
        notifications: 'Bildirimler',
        messages: 'Mesajlar',
        settings: 'Ayarlar',
        language: 'Dil',
        account: 'Hesap',
        contact: 'İletişim',
        about: 'Hakkında',
        pullToRefresh: 'Çekerek yenile...',
        refreshing: 'Yenileniyor...',
        loading: 'Yükleniyor...',
        noHashtags: 'Henüz popüler hashtag yok.',
        noResults: 'Sonuç yok'
      },
      en: {
        login: 'Sign In',
        register: 'Sign Up',
        home: 'Home',
        profile: 'Profile',
        search: 'Search users...',
        exploreTitle: 'Explore',
        notifications: 'Notifications',
        messages: 'Messages',
        settings: 'Settings',
        language: 'Language',
        account: 'Account',
        contact: 'Contact',
        about: 'About',
        pullToRefresh: 'Pull to refresh...',
        refreshing: 'Refreshing...',
        loading: 'Loading...',
        noHashtags: 'No popular hashtags yet.',
        noResults: 'No results'
      },
      ru: {
        login: 'Войти',
        register: 'Регистрация',
        home: 'Главная',
        profile: 'Профиль',
        search: 'Поиск пользователей...',
        exploreTitle: 'Исследовать',
        notifications: 'Уведомления',
        messages: 'Сообщения',
        settings: 'Настройки',
        language: 'Язык',
        account: 'Аккаунт',
        contact: 'Контакт',
        about: 'О нас',
        pullToRefresh: 'Потяните для обновления...',
        refreshing: 'Обновление...',
        loading: 'Загрузка...',
        noHashtags: 'Пока нет популярных хэштегов.',
        noResults: 'Нет результатов'
      }
    };

    function setLanguage(lang) {
      localStorage.setItem('appLang', lang);
      document.documentElement.lang = lang;
      currentLang = lang;
      updateTexts();
      location.reload();
    }

    function updateTexts() {
      const t = translations[currentLang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t[el.dataset.i18n] || el.textContent;
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        el.placeholder = t[el.dataset.i18nPlaceholder] || el.placeholder;
      });
      const loadingMore = document.getElementById('loadingMore');
      if (loadingMore) loadingMore.textContent = t.loading;
      const noHashtags = document.getElementById('noHashtags');
      if (noHashtags) noHashtags.textContent = t.noHashtags;
      const refreshIndicator = document.getElementById('refreshIndicator');
      if (refreshIndicator) refreshIndicator.textContent = t.pullToRefresh;
    }

    function updateNavAuth() {
      const loginLink = document.getElementById('loginLink');
      const registerLink = document.getElementById('registerLink');
      if (currentUser) {
        if (loginLink) loginLink.style.display = 'none';
        if (registerLink) registerLink.style.display = 'none';
      } else {
        if (loginLink) loginLink.style.display = 'inline-flex';
        if (registerLink) registerLink.style.display = 'inline-flex';
      }
    }

    /* HELPERS */
    function escapeHTML(str) {
      if (!str) return '';
      return (str || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]);
    }
    function debounce(fn, delay = 200) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), delay); } }
    function showError(label, err) { console.error(label, err); try { alert(label + ': ' + ((err && (err.message || err.error)) || JSON.stringify(err))); } catch (e) {} }

    function fallbackAvatar(username) {
      const c = (username || 'U')[0].toUpperCase();
      const svg = encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><rect width='100%' height='100%' fill='#222'/><text x='50%' y='56%' font-family='Arial' font-size='38' fill='#fff' text-anchor='middle' dominant-baseline='middle'>${c}</text></svg>`);
      return `data:image/svg+xml;charset=utf-8,${svg}`;
    }

    /* HASHTAG FETCH (updated: try in three steps according to DB structure) */
    async function fetchTopHashtags() {
      try {
        // 1) If the hashtags table has 'tag' and 'count' columns, pull directly (e.g., view or pre-calculated table)
        try {
          const { data: preagg, error: preaggErr } = await supabase
            .from('hashtags')
            .select('tag, count')
            .order('count', { ascending: false })
            .limit(10);

          if (!preaggErr && preagg && preagg.length > 0) {
            // ensure count is numeric
            return preagg.map(r => ({ tag: r.tag, count: Number(r.count) || 0 }));
          }
        } catch (e) {
          // ignore and try next method
          console.warn('preagg attempt failed', e);
        }

        // 2) If there is an RPC (get_top_hashtags) in the DB, let's try it (optional server-side function)
        try {
          const { data: rpcData, error: rpcErr } = await supabase.rpc('get_top_hashtags', { limit_count: 10 });
          if (!rpcErr && rpcData && rpcData.length > 0) {
            return rpcData.map(r => ({ tag: r.tag, count: Number(r.count) || 0 }));
          }
        } catch (e) {
          console.warn('rpc attempt failed', e);
        }

        // 3) Fallback: get all hashtag records and do client-side aggregate (suitable for small/medium sized datasets)
        //    Note: This method can be costly in very large databases — in that case create a view or rpc in the DB.
        const BATCH_LIMIT = 10000; // can be increased as needed
        const { data, error } = await supabase
          .from('hashtags')
          .select('tag')
          .limit(BATCH_LIMIT);

        if (error) throw error;

        if (!data || data.length === 0) return [];

        const counts = data.reduce((acc, row) => {
          const tagRaw = row.tag;
          if (!tagRaw) return acc;
          const tag = String(tagRaw).trim();
          if (!tag) return acc;
          acc[tag] = (acc[tag] || 0) + 1;
          return acc;
        }, {});

        const arr = Object.entries(counts)
          .map(([tag, count]) => ({ tag, count }))
          .sort((a, b) => b.count - a.count)
          .slice(0, 10);

        return arr;
      } catch (err) {
        showError('fetchTopHashtags', err);
        return [];
      }
    }

    function renderHashtag(hashtag) {
      const feed = document.getElementById('hashtagsFeed');
      if (!feed) return;

      const card = document.createElement('div');
      card.className = 'hashtag-card';
      const countText = (hashtag.count !== undefined && hashtag.count !== null) ? `${escapeHTML(String(hashtag.count))} posts` : '— posts';
      card.innerHTML = `
        <i class="fa-solid fa-hashtag hashtag-icon"></i>
        <div class="hashtag-meta">
          <div class="hashtag-name">#${escapeHTML(hashtag.tag)}</div>
          <div class="hashtag-count">${countText}</div>
        </div>
      `;
      card.addEventListener('click', () => {
        window.location.href = `hashtag.html?tag=${encodeURIComponent(hashtag.tag)}`;
      });
      feed.appendChild(card);
    }

    async function initialRender() {
      const feed = document.getElementById('hashtagsFeed');
      if (feed) feed.innerHTML = '';
      const loadingEl = document.getElementById('loadingMore');
      if (loadingEl) loadingEl.style.display = 'block';

      const hashtags = await fetchTopHashtags();
      if (hashtags.length === 0) {
        const noEl = document.getElementById('noHashtags');
        if (noEl) noEl.style.display = 'block';
      } else {
        hashtags.forEach(renderHashtag);
      }

      if (loadingEl) loadingEl.style.display = 'none';
      setupRealtime();
      await updateNotifCount();
    }

    /* SEARCH (simple user search, for explore) */
    async function doSearch(q) {
      try {
        q = (q || '').trim();
        const resWrap = document.getElementById('searchResults');
        if (!q) {
          if (resWrap) resWrap.style.display = 'none';
          return;
        }

        resWrap.innerHTML = '';

        // User search
        const { data: users, error } = await supabase
          .from('profiles')
          .select('id, username, display_name, avatar_url')
          .ilike('username', `%${q}%`)
          .limit(20);

        if (error) {
          console.warn('search profiles error', error);
        } else if (users && users.length > 0) {
          users.forEach(u => {
            const item = document.createElement('div');
            item.className = 'search-item';
            const avatar = u.avatar_url || fallbackAvatar(u.username);
            item.innerHTML = `<img class="s-avatar" src="${escapeHTML(avatar)}" width="36" height="36" alt="avatar"> <div class="s-meta"><div class="s-name">${escapeHTML(u.display_name || u.username)}</div><div class="s-username">@${escapeHTML(u.username)}</div></div>`;
            item.addEventListener('mousedown', (ev) => {
              ev.preventDefault();
              window.location.href = `profile.html?id=${u.id}`;
              resWrap.style.display = 'none';
            });
            resWrap.appendChild(item);
          });
        }

        if (resWrap.innerHTML === '') {
          const p = document.createElement('div');
          p.className = 'search-item';
          p.textContent = translations[currentLang].noResults;
          resWrap.appendChild(p);
        }

        resWrap.style.display = 'block';
      } catch (err) { showError('doSearch catch', err); }
    }

    /* REALTIME NOTIFS */
    function setupRealtime() {
      try {
        realtimeNotifChannel = supabase.channel('public:notifications')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications' }, async payload => {
            if (payload.new.recipient_id === currentUser) {
              await updateNotifCount();
            }
          })
          .subscribe();
      } catch (err) { console.warn('realtime setup error', err); }
    }

    /* NOTIFICATIONS */
    async function updateNotifCount() {
      try {
        await loadCurrentUser();
        if (!currentUser) {
          const el = document.getElementById('notifCount');
          if (el) el.style.display = 'none';
          return;
        }
        const { count } = await supabase.from('notifications').select('*', { count: 'exact', head: false }).eq('recipient_id', currentUser).eq('is_read', false);
        const el = document.getElementById('notifCount');
        if (el) {
          if (count && count > 0) {
            el.style.display = 'inline-block';
            el.textContent = count;
          } else {
            el.style.display = 'none';
          }
        }
      } catch (e) { console.warn('notif count', e); }
    }

    /* PULL TO REFRESH */
    async function refreshFeed() {
      await initialRender();
    }

    const ALLOW_START_ZONE = 40;
    const MIN_DRAG_TO_ACTIVATE = 12;
    const THRESHOLD = 80;

    function getScrollableAncestor(el) {
      while (el && el !== document.body) {
        const style = window.getComputedStyle(el);
        const overflowY = style.overflowY;
        if ((overflowY === 'auto' || overflowY === 'scroll') && el.scrollHeight > el.clientHeight) return el;
        el = el.parentElement;
      }
      return document.documentElement;
    }

    function shouldStartPTR(target) {
      if (!target) return false;
      if (target.closest && target.closest('.no-ptr')) return false;
      if (target.closest && target.closest('nav, .bottom-bar, button, input, textarea, select, a, .actions, .action, .modal, .search-wrapper')) {
        return false;
      }
      return true;
    }

    let startY = 0;
    let pulling = false;
    let pullDistance = 0;
    let pointerDown = false;
    const MAX_PULL = 150;
    let isRefreshing = false;
    const wrap = document.getElementById('feedPage');
    const spinner = document.createElement('div');
    spinner.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
    spinner.style.position = 'absolute';
    spinner.style.top = '10px';
    spinner.style.left = '50%';
    spinner.style.transform = 'translateX(-50%)';
    spinner.style.display = 'none';
    wrap.appendChild(spinner);

    wrap.classList.add('ptr-wrap');

    function onTouchStart(e) {
      if (isRefreshing) return;
      if (window.scrollY !== 0) return;
      if (!e.touches || e.touches.length !== 1) return;

      const startTarget = e.target;
      if (!shouldStartPTR(startTarget)) return;

      const y = e.touches[0].clientY;
      if (y > ALLOW_START_ZONE) return;

      const sc = getScrollableAncestor(startTarget);
      if (sc && sc.scrollTop !== 0) return;

      startY = y;
      pulling = true;
      pullDistance = 0;
      wrap.style.transition = 'none';
    }

    function onTouchMove(e) {
      if (!pulling || isRefreshing) return;
      if (!e.touches || e.touches.length !== 1) return;
      const currentY = e.touches[0].clientY;
      const delta = currentY - startY;
      if (delta <= 0) return;
      if (delta < MIN_DRAG_TO_ACTIVATE) return;

      e.preventDefault();

      const damp = Math.min(MAX_PULL, Math.round((1 - Math.pow(0.8, delta / 12)) * delta));
      pullDistance = damp;
      wrap.style.transform = `translateY(${damp}px)`;
      wrap.classList.add('visible');
      spinner.style.transform = `rotate(${damp * 3}deg)`;

      if (pullDistance >= THRESHOLD) {
        wrap.classList.add('ready');
      } else {
        wrap.classList.remove('ready');
      }
    }

    function onTouchEnd() {
      if (!pulling) return;
      pulling = false;
      wrap.style.transition = 'transform 300ms ease';
      if (pullDistance >= THRESHOLD) {
        triggerRefresh();
      } else {
        resetPull(true);
      }
    }

    function onPointerDown(e) {
      if (isRefreshing) return;
      if (window.scrollY !== 0) return;
      if (!e.isPrimary) return;

      const startTarget = e.target;
      if (!shouldStartPTR(startTarget)) return;

      const y = e.clientY;
      if (y > ALLOW_START_ZONE) return;

      const sc = getScrollableAncestor(startTarget);
      if (sc && sc.scrollTop !== 0) return;

      pointerDown = true;
      startY = y;
      pullDistance = 0;
      wrap.style.transition = 'none';
    }

    function onPointerMove(e) {
      if (!pointerDown || isRefreshing) return;
      const currentY = e.clientY;
      const delta = currentY - startY;
      if (delta <= 0) return;
      if (delta < MIN_DRAG_TO_ACTIVATE) return;
      e.preventDefault && e.preventDefault();

      const damp = Math.min(MAX_PULL, Math.round((1 - Math.pow(0.8, delta / 12)) * delta));
      pullDistance = damp;
      wrap.style.transform = `translateY(${damp}px)`;
      wrap.classList.add('visible');
      spinner.style.transform = `rotate(${damp * 3}deg)`;
      if (pullDistance >= THRESHOLD) wrap.classList.add('ready'); else wrap.classList.remove('ready');
    }

    function onPointerUp() {
      if (!pointerDown) return;
      pointerDown = false;
      wrap.style.transition = 'transform 300ms ease';
      if (pullDistance >= THRESHOLD) triggerRefresh(); else resetPull(true);
    }

    function triggerRefresh() {
      isRefreshing = true;
      spinner.style.display = 'block';
      document.getElementById('refreshIndicator').textContent = translations[currentLang].refreshing;
      refreshFeed().finally(() => {
        resetPull(false);
        isRefreshing = false;
        spinner.style.display = 'none';
      });
    }

    function resetPull(animate) {
      if (animate) {
        wrap.style.transform = 'translateY(0)';
        setTimeout(() => {
          wrap.classList.remove('visible', 'ready');
        }, 300);
      } else {
        wrap.style.transform = 'translateY(0)';
        wrap.classList.remove('visible', 'ready');
      }
    }

    window.addEventListener('touchstart', onTouchStart, { passive: true });
    window.addEventListener('touchmove', onTouchMove, { passive: false });
    window.addEventListener('touchend', onTouchEnd, { passive: true });

    window.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
    window.addEventListener('pointercancel', onPointerUp);

    /* SEARCH UI helpers */
    function attachSearchUI() {
      const wrapper = document.getElementById('searchWrapper');
      const input = document.getElementById('searchInput');
      const resWrap = document.getElementById('searchResults');

      document.addEventListener('click', (e) => {
        if (!wrapper.contains(e.target)) {
          if (resWrap) resWrap.style.display = 'none';
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (resWrap) resWrap.style.display = 'none';
          if (input) input.blur();
        }
      });

      if (input) {
        input.addEventListener('blur', () => {
          setTimeout(() => {
            if (resWrap) resWrap.style.display = 'none';
          }, 200);
        });
      }
    }

    /* AUTH & PROFILE helpers */
    async function loadCurrentUser() {
      try {
        if (USE_PLACEHOLDER_KEY) {
          currentUser = null; currentUserData = null; return;
        }
        const { data } = await supabase.auth.getUser();
        const user = data?.user || null;
        if (!user) {
          currentUser = null;
          currentUserData = null;
          return;
        }
        currentUser = user.id;
        const { data: profile, error } = await supabase
          .from('profiles')
          .select('id, username, display_name, avatar_url, profile_pic')
          .eq('id', currentUser)
          .single();
        if (error && error.code !== 'PGRST116') console.warn('profile load', error);
        currentUserData = profile || null;
      } catch (err) { showError('loadCurrentUser', err); currentUser = null; currentUserData = null; }
    }

    /* INIT */
    async function tryInit() {
      try {
        updateTexts();
        await loadCurrentUser();
        updateNavAuth();
        await updateNotifCount();
        if (!USE_PLACEHOLDER_KEY) {
          supabase.auth.onAuthStateChange(async (event, session) => {
            await loadCurrentUser();
            updateNavAuth();
            await updateNotifCount();
          });
        }
        const settingsLink = document.getElementById('settingsLink');
        const settingsMenu = document.getElementById('settingsMenu');
        const languageBtn = document.getElementById('languageBtn');
        const languageList = document.getElementById('languageList');

        if (settingsLink && settingsMenu) {
          settingsLink.addEventListener('click', (e) => {
            e.preventDefault();
            const rect = settingsLink.getBoundingClientRect();
            const menuWidth = 150;
            if (settingsMenu.style.display === 'block') {
              settingsMenu.style.display = 'none';
            } else {
              settingsMenu.style.display = 'block';
              const menuHeight = settingsMenu.offsetHeight || 180;
              settingsMenu.style.top = `${rect.top - menuHeight - 10}px`;
              settingsMenu.style.left = `${Math.max(10, window.innerWidth / 2 - menuWidth / 2)}px`;
              settingsMenu.style.zIndex = '2001';
            }
          });

          document.addEventListener('click', (e) => {
            if (!settingsMenu.contains(e.target) && e.target !== settingsLink) {
              settingsMenu.style.display = 'none';
            }
          });
        }

        if (languageBtn && languageList) {
          languageBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            languageList.style.display = (languageList.style.display === 'block') ? 'none' : 'block';
          });

          languageList.querySelectorAll('a[data-lang]').forEach(link => {
            link.addEventListener('click', (e) => {
              e.preventDefault();
              e.stopPropagation();
              const lang = e.currentTarget.dataset.lang;
              setLanguage(lang);
            });
          });
        }

        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
          searchInput.addEventListener('input', debounce((e) => {
            const q = e.target.value;
            if (!q) {
              const res = document.getElementById('searchResults');
              if (res) res.style.display = 'none';
              return;
            }
            doSearch(q);
          }, 300));
        }

        attachSearchUI();
        await initialRender();
      } catch (err) { console.error('tryInit error', err); }
    }

    tryInit();
  </script>
</body>
