<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kayıt Ol / Giriş Yap - Concordia Nova</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
  }
  .container { display:flex; justify-content:center; align-items:center; height:100%; }
  .box {
    background: rgba(0,0,0,0.6);
    padding: 28px;
    border-radius: 12px;
    width: 360px;
    max-width: 92%;
    text-align: center;
    box-shadow: 0 6px 18px rgba(0,0,0,0.5);
  }
  .box h2 { margin-bottom: 14px; }
  .box label { display:block; margin-top:10px; font-weight:600; text-align:left; }
  .box input {
    width:100%; padding:9px; margin-top:6px; border-radius:6px; border:none;
    background: rgba(255,255,255,0.08); color:#fff; outline: none;
  }
  .box button {
    width:100%; margin-top:18px; padding:11px; border:none; border-radius:8px;
    background:#1DA1F2; color:#fff; font-weight:700; cursor:pointer;
  }
  .box button[disabled]{ opacity:0.6; cursor:not-allowed; }
  .toggle-btn {
    margin-top:12px; background:transparent; border:1px solid #fff; color:#fff; cursor:pointer; padding:8px; border-radius:8px;
  }
  .muted { color:#ccc; font-size:13px; margin-top:8px; text-align:left; }
  .error { color:#ffb3b3; font-size:13px; margin-top:8px; text-align:left; }
  .success { color:#bfffbf; font-size:13px; margin-top:8px; text-align:left; }
</style>
</head>
<body>
<div class="container">
  <!-- Kayıt -->
  <div class="box" id="registerBox">
    <h2>Kayıt Ol</h2>

    <label for="fullName">Ad Soyad</label>
    <input type="text" id="fullName" placeholder="Ad Soyad">

    <label for="username">Kullanıcı Adı</label>
    <input type="text" id="username" placeholder="Kullanıcı Adı (unique)">

    <label for="email">E-posta</label>
    <input type="email" id="email" placeholder="E-posta">

    <label for="password">Şifre</label>
    <input type="password" id="password" placeholder="Şifre (en az 6 karakter)">

    <div id="regMessage" class=""></div>

    <button id="registerBtn" type="button">Kayıt Ol</button>
    <button class="toggle-btn" id="toLoginBtn" type="button">Zaten hesabın var mı? Giriş Yap</button>

    <div class="muted">Hesap oluşturduktan sonra profil bilgilerini doldurabilirsin.</div>
  </div>

  <!-- Giriş -->
  <div class="box" id="loginBox" style="display:none;">
    <h2>Giriş Yap</h2>

    <label for="loginEmail">E-posta</label>
    <input type="email" id="loginEmail" placeholder="E-posta">

    <label for="loginPassword">Şifre</label>
    <input type="password" id="loginPassword" placeholder="Şifre">

    <div id="loginMessage" class=""></div>

    <button id="loginBtn" type="button">Giriş Yap</button>
    <button class="toggle-btn" id="toRegisterBtn" type="button">Hesabın yok mu? Kayıt Ol</button>

    <div style="display:flex; gap:8px; margin-top:10px;">
      <button id="forgotBtn" type="button" style="flex:1; background:transparent; border:1px solid #fff; color:#fff; border-radius:8px; padding:8px;">Şifremi Unuttum</button>
    </div>

    <div class="muted">Unutursan şifre sıfırlama e-posta isteyebilirsin.</div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  // --- CONFIG: kendi değerlerini buraya yapıştır ---
  const SUPABASE_URL = 'https://shkttorkfcnvkrwnkixf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNoa3R0b3JrZmNudmtyd25raXhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY2NzY2ODAsImV4cCI6MjA3MjI1MjY4MH0.GgDA8tSgQoMhCt_BYZU3mCkKaErUs_SQVNeWdCGQOgI';
  // =================================================

  const USE_PLACEHOLDER_KEY = !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes('PASTE_YOUR_ANON_KEY_HERE');

  if (USE_PLACEHOLDER_KEY) console.warn('[Concordia Nova] Supabase anon key eksik; localStorage fallback aktif.');

  // create supabase client (auth session otomatik tutulur)
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true }
  });

  // DOM
  const registerBox = document.getElementById('registerBox');
  const loginBox = document.getElementById('loginBox');
  const toLoginBtn = document.getElementById('toLoginBtn');
  const toRegisterBtn = document.getElementById('toRegisterBtn');
  const registerBtn = document.getElementById('registerBtn');
  const loginBtn = document.getElementById('loginBtn');
  const forgotBtn = document.getElementById('forgotBtn');
  const regMessage = document.getElementById('regMessage');
  const loginMessage = document.getElementById('loginMessage');

  // toggle
  toLoginBtn.addEventListener('click', toggleBox);
  toRegisterBtn.addEventListener('click', toggleBox);
  function toggleBox(){
    const isRegisterVisible = registerBox.style.display !== 'none';
    registerBox.style.display = isRegisterVisible ? 'none' : 'block';
    loginBox.style.display = isRegisterVisible ? 'block' : 'none';
    // temizle mesajlar
    regMessage.textContent = ''; regMessage.className = '';
    loginMessage.textContent = ''; loginMessage.className = '';
  }

  // küçük yardımcı fonksiyonlar
  function showRegError(msg){ regMessage.textContent = msg; regMessage.className = 'error'; }
  function showRegSuccess(msg){ regMessage.textContent = msg; regMessage.className = 'success'; }
  function showLoginError(msg){ loginMessage.textContent = msg; loginMessage.className = 'error'; }
  function showLoginSuccess(msg){ loginMessage.textContent = msg; loginMessage.className = 'success'; }

  // Basit doğrulama
  function validateRegisterInput(fullName, username, email, password){
    if(!fullName || !username || !email || !password) return 'Lütfen tüm alanları doldurun.';
    if(password.length < 6) return 'Şifre en az 6 karakter olmalı.';
    // basit email regex
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!re.test(email)) return 'Geçerli bir e-posta girin.';
    return null;
  }

  // Register: önce username kontrol et (profiles tablosu varsa)
  async function registerUser(){
    const fullName = document.getElementById('fullName').value.trim();
    const username = document.getElementById('username').value.trim().toLowerCase();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const validationErr = validateRegisterInput(fullName, username, email, password);
    if(validationErr){ showRegError(validationErr); return; }

    // LOCAL MOCK fallback (anon key yoksa)
    if(USE_PLACEHOLDER_KEY){
      const user = { id: 'local-1', displayName: fullName, username, email, password, bio: '' };
      localStorage.setItem('registeredUser', JSON.stringify(user));
      localStorage.setItem('loggedInUser', JSON.stringify(user));
      showRegSuccess('Kayıt başarılı (local). Yönlendiriliyorsunuz...');
      setTimeout(()=> window.location.href='profile.html', 900);
      return;
    }

    // disable button
    registerBtn.disabled = true;
    registerBtn.textContent = 'Kayıt yapılıyor...';
    showRegError(''); showRegSuccess('');

    try {
      // 0) username daha önce alınmış mı kontrol et (profiles tablosu eksikse hata yeneriz)
      try {
        const { data: existingUser, error: existErr } = await supabase
          .from('profiles')
          .select('id')
          .ilike('username', username)
          .limit(1)
          .maybeSingle();

        if(existErr && !existErr.message.includes('relation "profiles" does not exist')) {
          // beklenmedik hata (ör: permission), ama kayıtı durdurup bildir
          console.warn('profiles select error', existErr);
          showRegError('Kullanıcı adı kontrolü sırasında hata oluştu. Lütfen daha sonra tekrar deneyin.');
          return;
        }
        if(existingUser){
          showRegError('Bu kullanıcı adı zaten alınmış. Başka bir kullanıcı adı seçin.');
          return;
        }
      } catch(e){
        // tabela yoksa veya erişim yoksa, devam ediyoruz — profile inserti sırasında da hata verilecekse yakalayacağız
        console.info('profiles kontrolünde beklenmedik hata (devam ediliyor):', e?.message || e);
      }

      // 1) Supabase auth ile kullanıcı oluştur
      const { data: signData, error: signError } = await supabase.auth.signUp({
        email,
        password,
        options: {
          // isterseniz kayıt sırasında metadata gönderilebilir:
          data: { full_name: fullName, username }
        }
      });

      if(signError){
        console.error('signUp error', signError);
        // yaygın hatalar: email already registered, weak password, vb.
        showRegError('Kayıt hatası: ' + (signError.message || JSON.stringify(signError)));
        return;
      }

      const createdUser = signData?.user ?? null;
      if(!createdUser || !createdUser.id){
        showRegError('Kayıt başarısız: kullanıcı oluşturulamadı (auth).');
        return;
      }

      // 2) profiles tablosuna kaydetmeye çalış (opsiyonel, tablo yoksa bu adımı atla ama uyar)
      const profileObj = {
        id: createdUser.id,
        username,
        display_name: fullName,
        avatar_url: null,
        bio: null
      };

      const { data: profileData, error: profileErr } = await supabase.from('profiles').insert([profileObj]);

      if(profileErr){
        // Eğer hata unique constraint'ten geliyorsa (ör. username duplicate) kullanıcıyı bilgilendir
        console.warn('profile insert error', profileErr);

        // Yardımcı hata mesajları
        const pmsg = profileErr?.message || JSON.stringify(profileErr);
        if(pmsg.toLowerCase().includes('unique') || pmsg.toLowerCase().includes('duplicate') || pmsg.includes('already exists')){
          showRegError('Kullanıcı adı veya profil oluşturma sırasında çakışma var. Lütfen farklı bir kullanıcı adı deneyin.');
        } else if(pmsg.includes('relation "profiles" does not exist')){
          // tablo yok — auth başarılı fakat profil tablosu eksik
          showRegSuccess('Kayıt başarılı. Ancak profil tablosu bulunamadı; profil bilgisi otomatik oluşturulamadı. (Yönetici SQL uygulanmalı).');
        } else {
          showRegError('Profil oluşturulamadı: ' + pmsg);
        }

        // Not: client tarafında auth ile oluşturulmuş kullanıcıyı silemeyiz (admin yetkisi gerekir).
        // Bu yüzden profile insert hatası oluştuğunda kullanıcıya bilgi veriyoruz ve auth user var.
        return;
      }

      // Başarılı
      showRegSuccess('Kayıt başarılı. E-posta doğrulaması gerekiyorsa e-postanızı kontrol edin. Yönlendiriliyorsunuz...');
      setTimeout(()=> window.location.href = 'profile.html', 900);

    } catch(err){
      console.error('registerUser catch', err);
      showRegError('Kayıt sırasında hata oluştu: ' + (err?.message || JSON.stringify(err)));
    } finally {
      registerBtn.disabled = false;
      registerBtn.textContent = 'Kayıt Ol';
    }
  }

  // Login işlevi
  async function loginUser(){
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if(!email || !password){ showLoginError('E-posta ve şifre giriniz.'); return; }

    if(USE_PLACEHOLDER_KEY){
      const registeredUser = JSON.parse(localStorage.getItem('registeredUser'));
      if(!registeredUser){ showLoginError('Kayıtlı kullanıcı bulunamadı. Önce kayıt olun.'); toggleBox(); return; }
      if(email === registeredUser.email && password === registeredUser.password){
        localStorage.setItem('loggedInUser', JSON.stringify(registeredUser));
        showLoginSuccess('Giriş başarılı (local). Yönlendiriliyorsunuz...');
        setTimeout(()=> window.location.href='profile.html', 700);
        return;
      } else { showLoginError('E-posta veya şifre hatalı!'); return; }
    }

    loginBtn.disabled = true;
    loginBtn.textContent = 'Giriş yapılıyor...';
    showLoginError(''); showLoginSuccess('');

    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if(error){
        console.error('signIn error', error);
        showLoginError('Giriş hatası: ' + (error.message || JSON.stringify(error)));
        return;
      }
      // başarı
      showLoginSuccess('Giriş başarılı. Yönlendiriliyorsunuz...');
      setTimeout(()=> window.location.href='profile.html', 700);

    } catch(err){
      console.error('loginUser catch', err);
      showLoginError('Giriş sırasında hata: ' + (err?.message || JSON.stringify(err)));
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Giriş Yap';
    }
  }

  // Şifre sıfırlama
  async function sendPasswordReset(){
    const email = document.getElementById('loginEmail').value.trim();
    if(!email){ showLoginError('Şifre sıfırlama için e-posta girin'); return; }
    if(USE_PLACEHOLDER_KEY){ showLoginError('Şifre sıfırlama (mock): e-posta gönderilemiyor.'); return; }

    try {
      const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/update-password' // senin app'e göre ayarla
      });
      if(error){ console.error('resetPasswordForEmail error', error); showLoginError('Şifre sıfırlama hatası: ' + error.message); return; }
      showLoginSuccess('Şifre sıfırlama e-postası gönderildi. E-postanı kontrol et.');
    } catch(err){
      console.error('resetPassword catch', err);
      showLoginError('Şifre sıfırlama sırasında hata: ' + (err?.message || err));
    }
  }

  // event attach
  registerBtn.addEventListener('click', registerUser);
  loginBtn.addEventListener('click', loginUser);
  forgotBtn.addEventListener('click', sendPasswordReset);

  // init: eğer zaten logged in ise profile yönlendir
  (async function init(){
    if(USE_PLACEHOLDER_KEY){
      if(localStorage.getItem('loggedInUser')) window.location.href='profile.html';
      return;
    }
    try {
      const { data } = await supabase.auth.getUser();
      const user = data?.user ?? null;
      if(user) window.location.href = 'profile.html';

      // auth state listener (örn: magic link ile giriş olursa)
      supabase.auth.onAuthStateChange((event, session) => {
        if(event === 'SIGNED_IN') window.location.href = 'profile.html';
      });
    } catch(err){
      console.error('init auth check', err);
    }
  })();
</script>
</body>
</html>
