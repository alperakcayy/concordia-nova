<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hashtag - Concordia Nova</title>

  <!-- Google font + icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --glass: rgba(0,0,0,.8);
      --card: #101010;
      --muted: #cfcfcf;
      --accent: #1da1f2;
      --danger: #e0245e;
      --like-yellow: #ffd700;
      --bottom-bar-height: 64px;
      --safe-area-top: 0px;
      --safe-area-bottom: 0px;
    }

    @supports (padding: env(safe-area-inset-top)) {
      :root {
        --safe-area-top: env(safe-area-inset-top);
        --safe-area-bottom: env(safe-area-inset-bottom);
      }
    }

    :root {
      --bottom-bar-height: calc(64px + var(--safe-area-bottom));
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      background: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1950&q=80') center/cover fixed no-repeat;
      padding-bottom: var(--bottom-bar-height);
    }
    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      padding: calc(8px + var(--safe-area-top)) 10px 8px 10px;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,.12);
      flex-wrap: wrap;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 6px 8px;
      border-radius: 6px;
      position: relative;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      flex: 0 1 auto;
      min-width: 0;
    }
    .search-wrapper {
      position: relative;
      flex: 0 0 auto;
      width: 260px;
      max-width: 40vw;
      min-width: 140px;
      margin-left: 6px;
      margin-right: 6px;
    }
    .search-input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.45);
      color: #fff;
      outline: none;
      font-size: 14px;
      display: flex;
      align-items: center;
    }
    .search-input:focus { box-shadow: 0 4px 20px rgba(0,0,0,.4); }
    .search-results {
      position: absolute;
      left: 0;
      right: auto;
      top: calc(100% + 6px);
      width: 100%;
      background: rgba(0,0,0,.98);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px;
      max-height: 220px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 12px 36px rgba(0,0,0,.6);
      z-index: 99999;
      padding: 6px;
      display: none;
    }
    .search-item {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
    }
    .search-item:hover, .search-item.selected { background: rgba(255,255,255,.03); }
    .search-item .s-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      background: #222;
      border: 1px solid rgba(255,255,255,.06);
    }
    .search-item .s-meta { display: flex; flex-direction: column; }
    .s-name { font-weight: 600; font-size: 13px; color: #fff; }
    .s-username { font-size: 12px; color: #bdbdbd; }
    .notif-badge {
      position: absolute;
      top: 0px;
      right: 0px;
      min-width: 16px;
      height: 16px;
      line-height: 16px;
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      border-radius: 999px;
      text-align: center;
      padding: 0 4px;
      transform: translate(50%, -30%);
      font-weight: 700;
      z-index: 10;
    }
    .container {
      width: min(760px, 96vw);
      margin: 14px auto;
      background: var(--glass);
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.32);
    }
    h2 { margin: 0 0 10px; font-size: 18px; }
    .muted { color: var(--muted); font-size: 13px; }
    .tweet-box { background: #000; border-radius: 12px; padding: 12px; }
    .divider { height: 1px; background: rgba(255,255,255,.06); margin: 12px 0; }
    .feed { display: flex; flex-direction: column; gap: 12px; }
    .tweet {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px;
      padding: 12px;
    }
    .tweet:hover { box-shadow: 0 4px 12px rgba(0,0,0,.2); }
    .founder-tweet {
      border-left: 4px solid var(--like-yellow);
      background: rgba(255, 215, 0, 0.05);
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: #222;
      border: 1px solid rgba(255,255,255,.08);
    }
    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .action {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #ddd;
      cursor: pointer;
      font-size: 13px;
      padding: 6px 8px;
      border-radius: 6px;
      transition: .12s;
    }
    .action:hover { background: rgba(255,255,255,.04); }
    .comment-item {
      color: #d0d0d0;
      font-size: 13px;
      margin-top: 6px;
      background: rgba(255,255,255,.04);
      padding: 8px 8px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .center-muted { text-align: center; color: #bbb; margin: 8px 0; font-size: 13px; }
    #settingsMenu {
      display: none;
      position: fixed;
      left: 0;
      top: 0;
      background: rgba(0,0,0,.95);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      z-index: 2001;
      min-width: 150px;
      padding: 6px 8px;
      box-shadow: 0 12px 36px rgba(0,0,0,.6);
    }
    #settingsMenu a {
      display: block;
      padding: 8px 10px;
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      border-radius: 6px;
    }
    #settingsMenu a:hover { background: rgba(255,255,255,.03); }
    #languageList { display: none; }
    #languageList a { padding-left: 20px; }
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: var(--bottom-bar-height);
      padding: calc(6px + var(--safe-area-bottom)) 0 6px 0;
      background: rgba(0,0,0,.9);
      backdrop-filter: blur(6px);
      border-top: 1px solid rgba(255,255,255,.06);
      z-index: 1000;
    }
    .bottom-bar a {
      color: #fff;
      font-size: 14px;
      text-align: center;
      flex: 1;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px 4px;
      min-width: 0;
      position: relative;
    }
    .bottom-bar a i { font-size: 16px; line-height: 1; }
    .bottom-bar a span { font-size: 12px; display: block; white-space: nowrap; }
    .bottom-bar .notif-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      transform: none;
      min-width: 14px;
      height: 14px;
      font-size: 9px;
      line-height: 14px;
      background: var(--danger);
      color: #fff;
      border-radius: 50%;
      z-index: 10;
      font-weight: 700;
    }
    .quoted-tweet {
      margin-top: 10px;
      padding: 8px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      background: rgba(0,0,0,.5);
    }
    .quoted-tweet header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .quoted-tweet .name {
      font-size: 14px;
      font-weight: 600;
    }
    .quoted-tweet .uname {
      font-size: 12px;
      color: #bbb;
    }
    .quoted-tweet p {
      font-size: 13px;
      margin: 0;
    }
    .quoted-tweet img {
      max-width: 100%;
      border-radius: 6px;
      margin-top: 6px;
    }
    @media (max-width: 900px) {
      .search-wrapper { width: 200px; }
      nav { justify-content: space-between; padding: calc(8px + var(--safe-area-top)) 8px 8px 8px; }
    }
    @media (max-width: 600px) {
      :root { --bottom-bar-height: calc(56px + var(--safe-area-bottom)); }
      nav { gap: 6px; padding: calc(6px + var(--safe-area-top)) 6px 6px 6px; justify-content: space-between; align-items: center; }
      nav a { font-size: 12px; padding: 4px 6px; }
      .container { margin: 10px auto; padding: 12px; }
      .search-wrapper { width: 140px; max-width: 40vw; min-width: 100px; }
      .bottom-bar a span { font-size: 11px; }
      .bottom-bar a i { font-size: 14px; }
      body { padding-bottom: var(--bottom-bar-height); }
      #settingsMenu { min-width: 130px; padding: 6px; font-size: 13px; }
      .bottom-bar { padding: calc(6px + var(--safe-area-bottom)) 0 6px 0; }
    }

    /* New added styles */
    #floatingBtn {
      position: fixed;
      bottom: 80px; /* above bottom-bar */
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
      z-index: 1001;
    }
    #tweetModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      width: 80%;
      max-width: 500px;
      box-shadow: 0 8px 24px rgba(0,0,0,.32);
    }
    .modal-content textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.08);
      color: #fff;
      border-radius: 8px;
      resize: vertical;
      font-family: inherit;
      font-size: 14px;
    }
    .modal-content button {
      margin-top: 10px;
      padding: 8px 16px;
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .modal-content button:hover {
      background: #0d8bf2;
    }

    /* Founder Badge */
    .founder-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--like-yellow);
      font-size: 12px;
      font-weight: 600;
    }
    .founder-badge i {
      color: var(--like-yellow);
      font-size: 14px;
    }
    .name .founder-badge {
      margin-left: 6px;
    }
  </style>
</head>

  <script type="module">
    /* ====== GLOBALS ====== */
    let currentUser = null;
    let currentUserData = null;
    const PAGE_SIZE = 8;
    let feedRendered = 0;
    let isLoading = false;
    let reachedEnd = false;

    const API_BASE = '/api';

    /* HELPERS */
    function qs(name) { return new URLSearchParams(window.location.search).get(name); }
    function fmtTime(ts) { try { return new Date(ts).toLocaleString(); } catch { return String(ts); } }
    function escapeHTML(str) { return (str || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]); }
    function showError(label, err, el = null) { console.error(label, err); const msg = (err && (err.message || err.error)) || 'Unknown error'; if (el) { el.textContent = msg; el.style.display = 'block'; setTimeout(() => { el.style.display = 'none'; }, 5000); } else { alert(msg); } }
    function fallbackAvatar(username) {
      const c = (username || 'U')[0].toUpperCase();
      const svg = encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><rect width='100%' height='100%' fill='#222'/><text x='50%' y='56%' font-family='Arial' font-size='38' fill='#fff' text-anchor='middle' dominant-baseline='middle'>${c}</text></svg>`);
      return `data:image/svg+xml;charset=utf-8,${svg}`;
    }
    function linkHashtags(text) {
      return escapeHTML(text).replace(/#(\w+)/g, '<a href="hashtag.html?tag=$1" style="color: var(--accent); text-decoration: none;">#$1</a>');
    }
    function debounce(fn, delay = 200) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), delay); } }

    // Founder badge create (dummy)
    function renderFounderBadge(isFounder) {
      if (!isFounder) return '';
      return `<span class="founder-badge"><i class="fa-solid fa-crown"></i> Founder</span>`;
    }

    // API helper
    async function apiCall(path, options = {}) {
      const url = `${API_BASE}${path}`;
      const config = {
        headers: { 'Content-Type': 'application/json' },
        ...options
      };
      try {
        const res = await fetch(url, config);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }
        return await res.json();
      } catch (err) {
        throw err;
      }
    }

    /* AUTH & PROFILE helpers */
    async function loadCurrentUser() {
      try {
        currentUser = parseInt(localStorage.getItem('userId'));
        const username = localStorage.getItem('username');
        if (currentUser && username) {
          const res = await apiCall(`/users?username=${encodeURIComponent(username)}`);
          currentUserData = res.user || { id: currentUser, username };
        } else {
          currentUser = null;
          currentUserData = null;
        }
      } catch (err) { showError('loadCurrentUser', err); currentUser = null; currentUserData = null; }
    }

    /* FETCH TWEETS (Client-side hashtag filter) */
    async function fetchHashtagTweets(hashtag, offset = 0, limit = PAGE_SIZE) {
      try {
        const res = await apiCall(`/tweets?limit=${limit + offset}`);
        const filtered = res.filter(tweet => tweet.content.toLowerCase().includes(`#${hashtag.toLowerCase()}`)).slice(offset, offset + limit);
        return filtered.map(tweet => ({ ...tweet, profiles: { username: tweet.username, id: tweet.user_id } }));
      } catch (err) {
        showError('fetchHashtagTweets', err);
        return [];
      }
    }

    async function loadHashtagTweets(hashtag) {
      try {
        if (isLoading || reachedEnd) return;
        isLoading = true;
        const loadingEl = document.getElementById('loadingMore');
        if (loadingEl) loadingEl.style.display = 'block';

        const tweets = await fetchHashtagTweets(hashtag, feedRendered);
        if (!tweets || tweets.length === 0) {
          reachedEnd = true;
          const noMoreEl = document.getElementById('noMore');
          if (noMoreEl) noMoreEl.style.display = 'block';
          if (loadingEl) loadingEl.style.display = 'none';
          isLoading = false;
          return;
        }

        for (const t of tweets) {
          await renderSingleTweet(t, { prepend: false, isTemp: false });
        }

        feedRendered += tweets.length;
        if (loadingEl) loadingEl.style.display = 'none';
        isLoading = false;
      } catch (err) {
        showError('loadHashtagTweets catch', err);
        const loadingEl = document.getElementById('loadingMore');
        if (loadingEl) loadingEl.style.display = 'none';
        isLoading = false;
      }
    }

    /* SEARCH (Users) */
    async function doSearch(q) {
      try {
        q = (q || '').trim();
        const resWrap = document.getElementById('searchResults');
        if (!q) {
          if (resWrap) resWrap.style.display = 'none';
          return;
        }

        const res = await apiCall(`/users?username=${encodeURIComponent(q)}`);
        resWrap.innerHTML = '';

        if (!res.user) {
          const p = document.createElement('div');
          p.className = 'search-item';
          p.textContent = 'No results';
          resWrap.appendChild(p);
          resWrap.style.display = 'block';
          return;
        }

        const u = res.user;
        const item = document.createElement('div');
        item.className = 'search-item';
        const avatar = fallbackAvatar(u.username);
        let nameHTML = `${escapeHTML(u.username)}`;
        item.innerHTML = `<img class="s-avatar" src="${escapeHTML(avatar)}" width="36" height="36" alt="avatar"> <div class="s-meta"><div class="s-name">${nameHTML}</div><div class="s-username">@${escapeHTML(u.username)}</div></div>`;
        item.addEventListener('mousedown', (ev) => {
          ev.preventDefault();
          window.location.href = `profile.html?id=${u.id}`;
          resWrap.style.display = 'none';
        });
        resWrap.appendChild(item);

        resWrap.style.display = 'block';
      } catch (err) { showError('doSearch catch', err); }
    }

    /* RENDER SINGLE TWEET */
    async function renderSingleTweet(tweet, { prepend = true, isTemp = false } = {}) {
      const feed = document.getElementById('feed');
      if (!feed) return;
      if (document.querySelector(`[data-tweet="${tweet.id}"]`)) return;

      const article = document.createElement('article');
      article.className = 'tweet';
      if (isTemp) article.classList.add('temp');
      article.setAttribute('data-tweet', tweet.id);
      const profile = tweet.profiles || {};
      const isFounder = profile.is_founder || false;
      if (isFounder) {
        article.classList.add('founder-tweet');
      }

      const username = profile.username || (tweet.user_id || '').slice(0, 6);
      const display = profile.username || username;
      const avatar = fallbackAvatar(username);

      const isFollowingUser = await isFollowing(currentUser, tweet.user_id);

      // Dummy like
      let isLiked = false;

      const header = document.createElement('header');
      header.style.display = 'flex';
      header.style.alignItems = 'flex-start';
      header.style.gap = '10px';
      header.style.cursor = 'pointer';
      header.addEventListener('click', () => {
        window.location.href = `profile.html?id=${tweet.user_id}`;
      });
      const avatarImg = document.createElement('img');
      avatarImg.className = 'avatar';
      avatarImg.src = escapeHTML(avatar);
      avatarImg.alt = 'avatar';
      avatarImg.width = 48;
      avatarImg.height = 48;
      const headerInfo = document.createElement('div');
      headerInfo.style.flex = 1;
      const nameDiv = document.createElement('div');
      nameDiv.className = 'name';
      let nameHTML = `${escapeHTML(display)} <span class="uname" style="margin-left:8px;color:#bbb;font-weight:500;font-size:13px">@${escapeHTML(username)}</span>`;
      if (isFounder) {
        nameHTML += renderFounderBadge(isFounder);
      }
      nameDiv.innerHTML = nameHTML;
      const timeDiv = document.createElement('div');
      timeDiv.className = 'time muted';
      timeDiv.style.color = '#bbb';
      timeDiv.style.fontSize = '12px';
      timeDiv.style.marginTop = '4px';
      timeDiv.textContent = fmtTime(tweet.created_at);
      headerInfo.appendChild(nameDiv);
      headerInfo.appendChild(timeDiv);
      header.appendChild(avatarImg);
      header.appendChild(headerInfo);

      if (tweet.user_id !== currentUser) {
        const followDiv = document.createElement('div');
        const followBtn = document.createElement('button');
        followBtn.className = 'follow-btn';
        followBtn.dataset.user = tweet.user_id;
        followBtn.textContent = isFollowingUser ? 'Unfollow' : 'Follow';
        followDiv.appendChild(followBtn);
        header.appendChild(followDiv);
      }

      const textP = document.createElement('p');
      textP.style.margin = '10px 0 0 0';
      textP.innerHTML = linkHashtags(tweet.content || '');

      const imgDiv = tweet.content ? null : null; // No media

      let quotedDiv = null;
      if (tweet.quoted_tweet_id) {
        // Dummy quoted
        quotedDiv = document.createElement('div');
        quotedDiv.className = 'quoted-tweet';
        quotedDiv.innerHTML = '<p>Quoted tweet (under development for details)</p>';
      }

      const actions = document.createElement('div');
      actions.className = 'actions';
      actions.style.marginTop = '10px';
      actions.style.display = 'flex';
      actions.style.gap = '12px';
      actions.style.alignItems = 'center';

      const likeDiv = document.createElement('div');
      likeDiv.className = 'action like';
      likeDiv.dataset.id = tweet.id;
      const likeIconClass = isLiked ? 'fa-solid fa-star' : 'fa-regular fa-star';
      const likeIconColor = isLiked ? 'var(--like-yellow)' : '#ddd';
      likeDiv.innerHTML = `<i class="${likeIconClass}" style="color: ${likeIconColor};"></i><span class="like-count" style="margin-left:6px">${tweet.likes_count || 0}</span>`;

      const commentBtnDiv = document.createElement('div');
      commentBtnDiv.className = 'action comment-btn';
      commentBtnDiv.dataset.id = tweet.id;
      commentBtnDiv.innerHTML = '<i class="fa-solid fa-comment"></i><span class="comment-count" style="margin-left:6px">' + (tweet.comments_count || 0) + '</span>';

      const quoteBtnDiv = document.createElement('div');
      quoteBtnDiv.className = 'action quote-btn';
      quoteBtnDiv.dataset.id = tweet.id;
      quoteBtnDiv.innerHTML = '<i class="fa-solid fa-quote-left" style="color: var(--accent);"></i><span class="quote-count" style="margin-left:6px">' + (tweet.quotes_count || 0) + '</span>';

      actions.appendChild(likeDiv);
      actions.appendChild(commentBtnDiv);
      actions.appendChild(quoteBtnDiv);

      if (tweet.user_id === currentUser) {
        const deleteDiv = document.createElement('div');
        deleteDiv.className = 'action delete-btn';
        deleteDiv.dataset.id = tweet.id;
        deleteDiv.innerHTML = '<i class="fa-solid fa-trash"></i><span style="margin-left:6px">Delete</span>';
        actions.appendChild(deleteDiv);
      }

      const commentsWrap = document.createElement('div');
      commentsWrap.className = 'comments';
      commentsWrap.style.marginTop = '8px';
      commentsWrap.innerHTML = '<p class="small-muted">Comments are under development.</p>';

      const commentForm = document.createElement('div');
      commentForm.className = 'comment-form';
      commentForm.style.display = 'none';
      commentForm.style.marginTop = '8px';

      article.appendChild(header);
      article.appendChild(textP);
      if (imgDiv) article.appendChild(imgDiv);
      if (quotedDiv) article.appendChild(quotedDiv);
      article.appendChild(actions);
      article.appendChild(commentsWrap);
      article.appendChild(commentForm);

      // Dummy events
      const likeEl = article.querySelector('.action.like');
      if (likeEl) {
        likeEl.addEventListener('click', () => likeTweetHandler(tweet.id, article));
      }

      const commentBtn = article.querySelector('.comment-btn');
      if (commentBtn) {
        commentBtn.addEventListener('click', () => {
          commentForm.style.display = (commentForm.style.display === 'none') ? 'block' : 'none';
        });
      }

      const quoteBtn = article.querySelector('.quote-btn');
      if (quoteBtn) {
        quoteBtn.addEventListener('click', () => quoteTweetHandler(tweet.id));
      }

      const delBtn = article.querySelector('.delete-btn');
      if (delBtn) {
        delBtn.addEventListener('click', () => deleteTweetHandler(tweet.id, article));
      }

      const followBtn = article.querySelector('.follow-btn');
      if (followBtn) {
        followBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const targetId = parseInt(e.currentTarget.getAttribute('data-user'));
          if (e.currentTarget.textContent.trim() === 'Follow') {
            await followUser(targetId);
            e.currentTarget.textContent = 'Unfollow';
          } else {
            await unfollowUser(targetId);
            e.currentTarget.textContent = 'Follow';
          }
        });
      }

      if (prepend) feed.prepend(article); else feed.appendChild(article);
    }

    /* NOTIFICATIONS (dummy) */
    async function updateNotifCount() {
      const el = document.getElementById('notifCount');
      if (el) el.style.display = 'none';
    }

    /* New added tweet posting function */
    async function postTweet(text, hashtag) {
      const modalError = document.getElementById('modal-tweet-error');
      try {
        await loadCurrentUser();
        if (!currentUser) { alert('You need to log in!'); return; }
        if (!text || text.length > 280) {
          showError('Tweet too long', 'Maximum 280 characters.', modalError);
          return;
        }

        const payload = {
          user_id: currentUser,
          content: text
        };
        const res = await apiCall('/tweets', { method: 'POST', body: JSON.stringify(payload) });
        if (res.status !== 'tweet created') {
          throw new Error(res.error || 'Tweet could not be created');
        }

        // Hashtag client-side, no backend insert
        await loadHashtagTweets(hashtag);
      } catch (err) {
        showError('postTweet catch', err, modalError);
      }
    }

    /* INIT */
    async function tryInit() {
      try {
        await loadCurrentUser();
        await updateNotifCount();

        const hashtag = qs('tag');
        if (!hashtag) {
          const hashtagTitleEl = document.getElementById('hashtagTitle');
          hashtagTitleEl.textContent = 'Hashtag not found';
          const feed = document.getElementById('feed');
          feed.innerHTML = '<p class="center-muted">Please specify a hashtag.</p>';
          return;
        }
        const hashtagTitleEl = document.getElementById('hashtagTitle');
        hashtagTitleEl.textContent = `#${hashtag}`;

        const settingsLink = document.getElementById('settingsLink');
        const settingsMenu = document.getElementById('settingsMenu');
        const languageBtn = document.getElementById('languageBtn');
        const languageList = document.getElementById('languageList');

        if (settingsLink && settingsMenu) {
          settingsLink.addEventListener('click', (e) => {
            e.preventDefault();
            settingsMenu.style.display = (settingsMenu.style.display === 'block') ? 'none' : 'block';
          });

          document.addEventListener('click', (e) => {
            if (!settingsMenu.contains(e.target) && e.target !== settingsLink) {
              settingsMenu.style.display = 'none';
            }
          });
        }

        if (languageBtn && languageList) {
          languageBtn.addEventListener('click', (e) => {
            e.preventDefault();
            languageList.style.display = (languageList.style.display === 'block') ? 'none' : 'block';
          });
        }

        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
          searchInput.addEventListener('input', debounce((e) => {
            const q = e.target.value;
            if (!q) {
              const res = document.getElementById('searchResults');
              if (res) res.style.display = 'none';
              return;
            }
            doSearch(q);
          }, 300));
        }

        attachSearchUI();
        await loadHashtagTweets(hashtag);
        attachScroll();

        // Floating button and modal
        const floatingBtn = document.getElementById('floatingBtn');
        const tweetModal = document.getElementById('tweetModal');
        const tweetInput = document.getElementById('tweetInput');
        const submitTweet = document.getElementById('submitTweet');

        if (floatingBtn && tweetModal && tweetInput && submitTweet) {
          floatingBtn.addEventListener('click', () => {
            tweetInput.value = `#${hashtag} `;
            tweetModal.style.display = 'flex';
          });

          tweetModal.addEventListener('click', (e) => {
            if (e.target === tweetModal) {
              tweetModal.style.display = 'none';
            }
          });

          submitTweet.addEventListener('click', async () => {
            const text = tweetInput.value.trim();
            if (!text) return;
            await postTweet(text, hashtag);
            tweetModal.style.display = 'none';
            tweetInput.value = '';
          });
        }
      } catch (err) { console.error('tryInit error', err); }
    }

    /* SCROLL infinite */
    const onScroll = debounce(async () => {
      if (reachedEnd || isLoading) return;
      if (window.scrollY + window.innerHeight >= document.documentElement.scrollHeight * 0.85) {
        const hashtag = qs('tag');
        if (hashtag) await loadHashtagTweets(hashtag);
      }
    }, 120);
    function attachScroll() { window.addEventListener('scroll', onScroll); }
    function detachScroll() { window.removeEventListener('scroll', onScroll); }

    /* SEARCH UI helpers */
    function attachSearchUI() {
      const wrapper = document.getElementById('searchWrapper');
      const input = document.getElementById('searchInput');
      const resWrap = document.getElementById('searchResults');

      document.addEventListener('click', (e) => {
        if (!wrapper.contains(e.target)) {
          if (resWrap) resWrap.style.display = 'none';
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (resWrap) resWrap.style.display = 'none';
          if (input) input.blur();
        }
      });

      if (input) {
        input.addEventListener('blur', () => {
          setTimeout(() => {
            if (resWrap) resWrap.style.display = 'none';
          }, 200);
        });
      }
    }

    window.app = { followUser, unfollowUser, likeTweetHandler, addCommentHandler, deleteTweetHandler, doSearch };

    tryInit();
  </script>
</body>
</html>
